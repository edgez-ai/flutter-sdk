name: edgez_flutter_sdk_example
description: EdgeZ Flutter SDK example app without map support.
publish_to: none

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  edgez_flutter_sdk:
    path: ..
  sqflite: ^2.4.1
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/drivers/flow-meter-rs485/
    - assets/drivers/random-temperature/
    - assets/drivers/sht3x/
    - assets/drivers/vc0706-camera/
    - assets/drivers/vibration-rs485/
