name: edgez_flutter_sdk_example
description: In-memory EdgeZ Flutter SDK example app without map or database persistence.
publish_to: none

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  edgez_flutter_sdk:
    path: ..

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
