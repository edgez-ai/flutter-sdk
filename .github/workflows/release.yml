name: Generate signed SDK credential

on:
  workflow_dispatch:
    inputs:
      sdk_version:
        description: Flutter SDK version (for example, 0.1.0)
        required: true
        default: 0.1.0
        type: string
      compatibility:
        description: Firmware compatibility (for example, ^0.5.0)
        required: true
        default: ^0.5.0
        type: string

permissions:
  contents: write

concurrency:
  group: edgez-sdk-credential-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    environment: edgez-sdk-release
    steps:
      - name: Require a branch workflow run
        env:
          REF_TYPE: ${{ github.ref_type }}
        run: |
          if [[ "$REF_TYPE" != "branch" ]]; then
            echo 'Run this workflow from the branch that should receive the credential.' >&2
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Resolve credential identity
        id: credential
        env:
          COMPATIBILITY: ${{ inputs.compatibility }}
          VERSION: ${{ inputs.sdk_version }}
        shell: bash
        run: |
          set -euo pipefail
          simple_range_pattern='^[\^~]?[0-9]+\.[0-9]+\.[0-9]+$'
          comparator_range_pattern='^(>=|>|<=|<|=)?[0-9]+\.[0-9]+\.[0-9]+( (>=|>|<=|<|=)[0-9]+\.[0-9]+\.[0-9]+)*$'
          version_pattern='^[0-9]+\.[0-9]+\.[0-9]+([+-][0-9A-Za-z.-]+)?$'

          if [[ ! "$VERSION" =~ $version_pattern ]]; then
            echo "Invalid SDK version: $VERSION" >&2
            exit 1
          fi
          if [[ -z "$COMPATIBILITY" || ${#COMPATIBILITY} -gt 32 ]] ||
             [[ ! "$COMPATIBILITY" =~ $simple_range_pattern && ! "$COMPATIBILITY" =~ $comparator_range_pattern ]]; then
            echo "Invalid firmware compatibility range: $COMPATIBILITY" >&2
            exit 1
          fi

          release_id="edgez_flutter_sdk@$VERSION"
          if [[ ${#release_id} -gt 32 ]]; then
            echo "SDK release ID is longer than 32 characters: $release_id" >&2
            exit 1
          fi
          sed -i -E "0,/^version: .*/s//version: $VERSION/" pubspec.yaml
          if [[ "$(awk '/^version:/{print $2; exit}' pubspec.yaml)" != "$VERSION" ]]; then
            echo 'Failed to update the SDK version in pubspec.yaml.' >&2
            exit 1
          fi
          echo "compatibility=$COMPATIBILITY" >> "$GITHUB_OUTPUT"
          echo "release_id=$release_id" >> "$GITHUB_OUTPUT"

      - name: Generate signed Dart credential
        env:
          EDGEZ_SDK_SIGNING_PRIVATE_KEY_HEX: ${{ secrets.EDGEZ_SDK_SIGNING_PRIVATE_KEY_HEX }}
          COMPATIBILITY: ${{ steps.credential.outputs.compatibility }}
          RELEASE_ID: ${{ steps.credential.outputs.release_id }}
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const crypto = require('crypto');
          const fs = require('fs');

          const privateKeyHex =
            (process.env.EDGEZ_SDK_SIGNING_PRIVATE_KEY_HEX || '').trim();
          const compatibility = process.env.COMPATIBILITY || '';
          const releaseId = process.env.RELEASE_ID || '';
          if (!/^[0-9a-fA-F]{64}$/.test(privateKeyHex)) {
            throw new Error(
              'EDGEZ_SDK_SIGNING_PRIVATE_KEY_HEX must be a 32-byte P-256 scalar',
            );
          }

          const privateKey = Buffer.from(privateKeyHex, 'hex');
          const ecdh = crypto.createECDH('prime256v1');
          ecdh.setPrivateKey(privateKey);
          const publicKey = ecdh.getPublicKey(undefined, 'uncompressed');

          const key = crypto.createPrivateKey({
            key: {
              kty: 'EC',
              crv: 'P-256',
              d: privateKey.toString('base64url'),
              x: publicKey.subarray(1, 33).toString('base64url'),
              y: publicKey.subarray(33, 65).toString('base64url'),
            },
            format: 'jwk',
          });
          const payload = Buffer.from(
            `EDGEZ-FLUTTER-SDK-RELEASE-V1:${compatibility}:${releaseId}`,
            'utf8',
          );
          const signature = crypto.sign('sha256', payload, {
            key,
            dsaEncoding: 'ieee-p1363',
          });
          if (signature.length !== 64) {
            throw new Error('Expected a 64-byte P-256 signature');
          }

          const output =
            '// Generated by .github/workflows/release.yml. Do not edit.\n' +
            `const String edgezSdkCompatibility = ${JSON.stringify(compatibility)};\n` +
            `const String edgezSdkReleaseId = ${JSON.stringify(releaseId)};\n` +
            `const String edgezSdkReleaseSignatureHex = ` +
            `${JSON.stringify(signature.toString('hex').toUpperCase())};\n`;
          fs.writeFileSync('lib/src/edgez_sdk_release.g.dart', output, {
            encoding: 'utf8',
            mode: 0o644,
          });
          NODE

      - name: Commit credential to selected branch
        env:
          COMPATIBILITY: ${{ steps.credential.outputs.compatibility }}
          TARGET_BRANCH: ${{ github.ref_name }}
          VERSION: ${{ inputs.sdk_version }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -- pubspec.yaml lib/src/edgez_sdk_release.g.dart
          git commit -m "chore: sign SDK $VERSION for firmware $COMPATIBILITY"
          git push origin "HEAD:$TARGET_BRANCH"
