name: Build Android release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build release artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.4"
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: example
        run: flutter pub get

      - name: Build release app bundle
        working-directory: example
        run: flutter build appbundle --release

      - name: Build release APK
        working-directory: example
        run: flutter build apk --release

      - name: Prepare release artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-artifacts
          cp example/build/app/outputs/bundle/release/app-release.aab release-artifacts/
          cp example/build/app/outputs/flutter-apk/app-release.apk release-artifacts/

      - name: Upload Android release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release-${{ github.run_number }}
          path: release-artifacts/
          if-no-files-found: error
          retention-days: 14

      - name: Upload Android packages to GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/app-release.aab
            release-artifacts/app-release.apk
          fail_on_unmatched_files: true
          generate_release_notes: true
