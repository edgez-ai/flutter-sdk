syntax = "proto3";

package ai.edgez.halow;


enum Operation {
  OPERATION_UNSPECIFIED = 0;
  REQUEST = 1;
  RESPONSE = 2;
  ACKNOWLEDGE = 3;
  BROADCAST = 9;
}

enum Interface {
  INTERFACE_UNSPECIFIED = 0;
  USB = 1;
  BLE = 2;
  WIFI = 3;
  ETHERNET = 4;
  HALOW = 5;
  LORA = 6;
}

enum Mime {
  MIME_UNSPECIFIED = 0;
  MIME_TEXT = 1;
  MIME_VOICE = 2;
  MIME_IMAGE = 3;
  MIME_VIDEO = 4;
  MIME_BINARY = 5;
}

enum MarkerColor {
  MARKER_DEFAULT = 0;
  MARKER_RED = 1;
  MARKER_BLUE = 2;
  MARKER_PURPLE = 3;
  MARKER_YELLOW = 4;
  MARKER_PINK = 5;
  MARKER_BROWN = 6;
  MARKER_GREEN = 7;
  MARKER_ORANGE = 8;
  MARKER_DEEP_PURPLE = 9;
  MARKER_LIGHT_BLUE = 10;
  MARKER_CYAN = 11;
  MARKER_TEAL = 12;
  MARKER_LIME = 13;
  MARKER_DEEP_ORANGE = 14;
  MARKER_GRAY = 15;
  MARKER_BLUE_GRAY = 16;
}

enum DeviceSettingsAction {
  DEVICE_SETTINGS_ACTION_UNSPECIFIED = 0;
  DEVICE_SETTINGS_GET = 1;
  DEVICE_SETTINGS_SET = 2;
  DEVICE_SETTINGS_REPORT = 3;
}

enum ScriptConfigAction {
  SCRIPT_CONFIG_ACTION_UNSPECIFIED = 0;
  SCRIPT_CONFIG_BEGIN = 1;
  SCRIPT_CONFIG_CHUNK = 2;
  SCRIPT_CONFIG_COMMIT = 3;
  SCRIPT_CONFIG_DELETE = 4;
  SCRIPT_CONFIG_REPORT = 5;
}

message NetworkPacket {
  uint64 message_id_high = 1; // high 64 bits of message UUID
  uint64 message_id_low = 2;  // low 64 bits of message UUID
  uint64 from = 3;
  uint64 to = 4;
  Operation operation = 5;
  Interface interface = 6;  // self interface when option is request,broadcast, target interface for response. 
  uint32 sequence = 7; // when a message need to split into chunks, use sequence to control it
  uint64 user_high = 8;   // high 64 bits of self user UUID
  uint64 user_low = 9;    // low 64 bits of self user UUID
  Mime mime = 10;         // encrypted payload media type
  uint32 max_hop = 11;    // hop limit for forwarding this packet

  oneof body {
    bytes payload = 100;
    string beacon = 101;
    HaLowInterfaceStatus status = 102;
    HaLowInitConfig init = 103;
    DeviceSettings device_settings = 104;
    ScriptConfig script_config = 105;
  }
}

enum DeviceType {
  DEVICE_TYPE_UNSPECIFIED = 0;
  DEVICE_TYPE_UNKNOWN = 1;
  DEVICE_TYPE_USER = 2;
  DEVICE_TYPE_GATEWAY = 3;
  DEVICE_TYPE_BEACON = 4;
  DEVICE_TYPE_SENSOR = 5;
}

enum AlertCondition {
  ALERT_CONDITION_UNSPECIFIED = 0;
  ALERT_CONDITION_ENTER = 1;
  ALERT_CONDITION_EXIT = 2;
  ALERT_CONDITION_NEAR = 3;
  ALERT_CONDITION_FAR = 4;
  ALERT_CONDITION_LOW_BATTERY = 5;
}

message GeoFence {
  uint64 id_high = 1;
  uint64 id_low = 2;
  string name = 3;
  MarkerColor marker = 4;
  AlertCondition alert_condition = 5;
  uint32 geo_index = 6;
}

message SensorData {
  float latitude = 4;
  float longitude = 5;
  float altitude = 6;
  float temperature = 7;
  float humidity = 8;
  float pressure = 9;
  float vibration_average = 10;
}

message Beacon {
  uint64 user_id_high = 1;
  uint64 user_id_low = 2;
  string user_name = 3;
  bytes user_public_key = 4;
  float attitude = 5;
  float longitude = 6;
  MarkerColor marker = 7;
  DeviceType device_type = 8;
  uint32 beacon_interval_seconds = 9;
  bool sleeping = 10;
  GeoFence geo_fence = 100;
  SensorData sensor_data = 101;
}


message HaLowInterfaceStatus {
  bool supported = 1;
  bool stack_initialized = 2;
  bool mesh_mode = 3;
  bool link_up = 4;
  bool route_ready = 5;
  bool ready_for_report = 6;
  uint32 ethertype = 7;
  string mesh_id = 8;
  string ip_addr = 9;
  string gateway = 10;
  uint64 mac_address = 11;
}



message HaLowInitConfig {
  string country_code = 1;
  string mesh_id = 2;
  string passphrase = 3;
  uint32 max_hop = 4;
  uint64 user_id_high = 5;
  uint64 user_id_low = 6;
  string user_name = 7;
  bytes user_public_key = 8;
}

message DeviceSettings {
  DeviceSettingsAction action = 1;
  bool device_mode_enabled = 2;
  string mesh_id = 3;
  bool share_location = 4;
  string user_name = 5;
  MarkerColor marker = 6;
  uint32 beacon_interval_seconds = 7;
  uint64 user_id_high = 8;
  uint64 user_id_low = 9;
  bytes user_public_key = 10;
  bytes user_private_key = 11;
  float latitude = 12;
  float longitude = 13;
  uint32 max_hop = 14;
  GeoFence geo_fence = 15;
  string uart_i2c_sensor_type = 16;
  string rs485_sensor_type = 17;
  uint32 geo_index = 18;
}

message ScriptConfig {
  ScriptConfigAction action = 1;
  uint32 script_id = 2;
  string name = 3;
  uint32 version = 4;
  uint32 total_size = 5;
  uint32 offset = 6;
  bytes chunk = 7;
  string sensor_type = 8;
  bool select_uart_i2c = 9;
  bool select_rs485 = 10;
  uint32 global_buffer_size = 11;
  string mime_type = 12;
}
