name: edgez_flutter_sdk
description: Flutter SDK facade for EdgeZ HaLow mesh transport, status, nodes, and conversation messaging.
version: 0.1.0
publish_to: none

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

flutter:
  plugin:
    platforms:
      android:
        package: ai.edgez.flutter_sdk
        pluginClass: EdgezFlutterSdkPlugin

dependencies:
  cryptography: ^2.7.0
  fixnum: ^1.1.1
  flutter:
    sdk: flutter
  protobuf: ^5.0.0
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  protoc_plugin: ^23.0.0
