name: edgez_flutter_sdk
description: Flutter SDK facade for EdgeZ HaLow mesh transport, status, nodes, and conversation messaging.
version: 0.1.0
publish_to: none

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

flutter:
  plugin:
    platforms:
      android:
        package: ai.edgez.flutter_sdk
        pluginClass: EdgezFlutterSdkPlugin

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
